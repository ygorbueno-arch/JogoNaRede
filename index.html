<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Futebol</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(20, 20, 30, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid #2a2a3a;
        }

        h1 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 0 0 20px rgba(100, 100, 255, 0.3);
        }

        h2, h3, h4 {
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .btn {
            background: linear-gradient(135deg, #4a4a8a 0%, #6a5acd 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            margin: 5px;
            border: 1px solid #7a7aaa;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(106, 90, 205, 0.4);
            background: linear-gradient(135deg, #5a5a9a 0%, #7a6add 100%);
        }

        .btn-edit {
            background: linear-gradient(135deg, #ffaa00, #ff8800);
            border-color: #ffaa00;
            font-size: 12px;
            padding: 6px 12px;
        }

        .btn-save {
            background: linear-gradient(135deg, #28a745, #20c997);
            border-color: #28a745;
            font-size: 12px;
            padding: 6px 12px;
        }

        .btn-cancel {
            background: linear-gradient(135deg, #dc3545, #c82333);
            border-color: #dc3545;
            padding: 8px 16px;
            font-size: 14px;
        }

        .mode-selection {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 50px;
        }

        .mode-card {
            background: linear-gradient(145deg, #1e1e2e, #2a2a3e);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            flex: 1;
            max-width: 300px;
            border: 1px solid #3a3a4a;
        }

        .mode-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(106, 90, 205, 0.3);
            border-color: #6a5acd;
        }

        .hidden {
            display: none !important;
        }

        .leagues-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .league-card {
            background: linear-gradient(145deg, #1e1e2e, #252535);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: all 0.3s;
            border-left: 5px solid #6a5acd;
            border: 1px solid #3a3a4a;
        }

        .league-card:hover {
            transform: translateX(5px);
            box-shadow: 0 8px 25px rgba(106, 90, 205, 0.3);
            border-color: #6a5acd;
        }

        .teams-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 20px;
            max-height: 500px;
            overflow-y: auto;
        }

        .team-item {
            background: #1a1a2a;
            border: 2px solid #3a3a4a;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            color: #e0e0e0;
        }

        .team-item:hover {
            border-color: #6a5acd;
            background: #2a2a3a;
            transform: translateY(-2px);
        }

        .team-item.selected {
            background: linear-gradient(135deg, #4a4a8a, #6a5acd);
            color: white;
            border-color: #7a7aaa;
        }

        .team-overall {
            background: #6a5acd;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            min-width: 45px;
            text-align: center;
        }

        .main-layout {
            display: flex;
            gap: 30px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .team-details {
            flex: 2;
            min-width: 500px;
            background: #1a1a2a;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid #3a3a4a;
        }

        .team-overall-display {
            text-align: center;
            font-size: 3em;
            font-weight: bold;
            color: #6a5acd;
            margin: 20px 0;
            text-shadow: 0 0 30px rgba(106, 90, 205, 0.5);
            background: #1e1e2e;
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #6a5acd;
        }

        .team-info-card {
            background: #1e1e2e;
            border-radius: 10px;
            padding: 20px;
            margin: 15px 0;
            border: 1px solid #3a3a4a;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #2a2a3a;
        }

        .info-label {
            color: #b0b0b0;
            font-size: 14px;
        }

        .info-value {
            color: #ffffff;
            font-weight: bold;
            font-size: 14px;
        }

        .tactic-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
            margin: 3px;
        }

        .tactic-offensive { background: #dc3545; color: white; }
        .tactic-defensive { background: #0d6efd; color: white; }
        .tactic-possession { background: #28a745; color: white; }
        .tactic-counter { background: #ffaa00; color: black; }
        .tactic-pressing { background: #6f42c1; color: white; }
        .tactic-balanced { background: #17a2b8; color: white; }

        .formation-pitch {
            background: linear-gradient(135deg, #1a3a1a 0%, #0d2818 100%);
            border-radius: 15px;
            padding: 30px;
            margin: 20px 0;
            min-height: 400px;
            position: relative;
            border: 2px solid #2a5a2a;
            box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.5);
        }

        .player-dot {
            position: absolute;
            width: 50px;
            height: 50px;
            background: linear-gradient(145deg, #ffffff, #e0e0e0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.5s ease;
            font-size: 10px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
            color: #333;
            flex-direction: column;
            line-height: 1.2;
            z-index: 5;
        }

        .player-dot:hover {
            transform: scale(1.2);
            background: linear-gradient(145deg, #ffd700, #ffaa00);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            z-index: 10;
        }

        .player-dot.selected-for-sub {
            background: linear-gradient(145deg, #00ff00, #00cc00) !important;
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.8) !important;
            animation: pulse 0.8s infinite;
            z-index: 15;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .player-dot .player-name {
            font-size: 8px;
            max-width: 45px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .player-dot .player-rating {
            font-size: 9px;
            color: #6a5acd;
            font-weight: bold;
        }

        .squad-container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .squad-column {
            flex: 1;
            background: #1a1a2a;
            border-radius: 10px;
            padding: 15px;
            border: 1px solid #3a3a4a;
        }

        .squad-column.starters h4 {
            background: #1a3a1a;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
        }

        .squad-column.bench h4 {
            background: #3a2a1a;
            color: #ffaa00;
            border: 1px solid #ffaa00;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
        }

        .squad-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .squad-player {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: #1e1e2e;
            margin: 5px 0;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
            gap: 10px;
        }

        .squad-player:hover {
            background: #2a2a3e;
            border-color: #6a5acd;
        }

        .squad-player.selected-for-sub {
            background: #2a4a2a !important;
            border-color: #00ff00 !important;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
        }

        .player-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .player-rating-display {
            background: #6a5acd;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: bold;
        }

        .substitution-panel {
            background: linear-gradient(145deg, #1a2a1a, #2a3a2a);
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 20px;
            margin: 15px 0;
            text-align: center;
        }

        .simulation-options {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .sim-card {
            background: linear-gradient(145deg, #1e1e2e, #252535);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
            min-width: 200px;
            border: 1px solid #3a3a4a;
        }

        .sim-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(106, 90, 205, 0.3);
            border-color: #6a5acd;
        }

        .match-result {
            background: linear-gradient(145deg, #1e1e2e, #252535);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            margin-top: 30px;
            border: 1px solid #3a3a4a;
        }

        /* Estilos para simulação minuto a minuto */
        .minute-simulation-container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .minute-log-panel {
            flex: 1;
            background: #1a1a2a;
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #3a3a4a;
            max-height: 600px;
            overflow-y: auto;
        }

        .minute-stats-panel {
            flex: 1;
            background: #1a1a2a;
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #3a3a4a;
        }

        .score-display {
            text-align: center;
            font-size: 2.5em;
            font-weight: bold;
            color: #ffd700;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .minute-display {
            text-align: center;
            font-size: 1.5em;
            color: #6a5acd;
            margin: 10px 0;
        }

        .event-item {
            padding: 8px 12px;
            margin: 5px 0;
            border-radius: 5px;
            border-left: 3px solid #3a3a4a;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .event-goal-home { border-left-color: #00ff00; background: #1a2a1a; }
        .event-goal-away { border-left-color: #ff4444; background: #2a1a1a; }
        .event-yellow { border-left-color: #ffaa00; background: #2a2a1a; }
        .event-red { border-left-color: #ff0000; background: #2a1a1a; }
        .event-sub { border-left-color: #6a5acd; background: #1a1a2a; }
        .event-injury { border-left-color: #ff6b6b; background: #2a1a1a; }
        .event-info { border-left-color: #17a2b8; background: #1a2a2a; }

        .live-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .live-stat-item {
            background: #1e1e2e;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #3a3a4a;
        }

        .live-stat-item h4 {
            color: #b0b0b0;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .live-stat-item p {
            font-size: 18px;
            font-weight: bold;
            color: #6a5acd;
        }

        .player-stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid #2a2a3a;
            font-size: 13px;
        }

        .player-stat-name {
            flex: 1;
            color: #e0e0e0;
        }

        .player-stat-events {
            display: flex;
            gap: 10px;
        }

        .substitution-arrow {
            color: #6a5acd;
            font-weight: bold;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-item {
            background: #1a1a2a;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #3a3a4a;
        }

        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        select {
            padding: 10px;
            border-radius: 8px;
            border: 2px solid #3a3a4a;
            font-size: 16px;
            width: 100%;
            margin: 10px 0;
            background: #1a1a2a;
            color: #e0e0e0;
        }

        .btn-small {
            padding: 4px 8px;
            font-size: 12px;
            margin: 2px;
        }

        .alert-message {
            background: #28a745;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            text-align: center;
            font-weight: bold;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1e1e2e;
            border-radius: 15px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 2px solid #6a5acd;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        .edit-input {
            width: 120px;
            padding: 5px;
            border-radius: 5px;
            border: 1px solid #3a3a4a;
            background: #1a1a2a;
            color: #e0e0e0;
            text-align: left;
        }

        .rating-input {
            width: 60px;
            padding: 5px;
            border-radius: 5px;
            border: 1px solid #3a3a4a;
            background: #1a1a2a;
            color: #e0e0e0;
            text-align: center;
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a2a;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: #4a4a8a;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <h1>⚽ Simulador de Futebol</h1>
        
        <div id="mainScreen">
            <div class="mode-selection">
                <div class="mode-card" onclick="selectMode('career')">
                    <h3>🎮 Modo Carreira</h3>
                    <p>Gerencie seu time por toda a temporada</p>
                    <button class="btn">COMEÇAR</button>
                </div>
                <div class="mode-card" onclick="selectMode('simulator')">
                    <h3>⚡ Modo Simulador</h3>
                    <p>Simule partidas entre qualquer time</p>
                    <button class="btn">COMEÇAR</button>
                </div>
            </div>
        </div>

        <div id="simulatorScreen" class="hidden">
            <h2>Simulador - Escolha o Time 1</h2>
            <div id="simulatorContent"></div>
            <div class="navigation-buttons">
                <button class="btn" onclick="goToMain()">Voltar</button>
            </div>
        </div>

        <div id="simulationScreen" class="hidden">
            <h2>Simulação da Partida</h2>
            <div id="simulationContent"></div>
            <div class="navigation-buttons">
                <button class="btn" onclick="goToMain()">Voltar ao Menu</button>
            </div>
        </div>

        <div id="careerScreen" class="hidden">
            <h2>Modo Carreira - Escolha seu Time</h2>
            <div id="careerContent"></div>
            <div class="navigation-buttons">
                <button class="btn" onclick="goToMain()">Voltar</button>
            </div>
        </div>

        <div id="careerManagement" class="hidden">
            <div id="careerManagementContent"></div>
        </div>

        <div id="editModal" class="modal hidden">
            <div class="modal-content" id="editModalContent"></div>
        </div>
    </div>

    <script>
        // Cache global
        const teamsDataCache = {};

        // Dados padrão dos times
        const defaultTeamData = {
            stadium: 'Estádio Municipal',
            coach: 'Técnico do Time',
            tactic: 'balanced',
            tacticName: 'Equilibrado',
            players: []
        };

        // Dinâmicas táticas
        const tactics = {
            offensive: { name: 'Ofensivo', class: 'tactic-offensive', description: 'Ataque constante' },
            defensive: { name: 'Defensivo', class: 'tactic-defensive', description: 'Foco na defesa' },
            possession: { name: 'Posse de Bola', class: 'tactic-possession', description: 'Controle do jogo' },
            counter: { name: 'Contra-Ataque', class: 'tactic-counter', description: 'Defende e ataca rápido' },
            pressing: { name: 'Pressão Alta', class: 'tactic-pressing', description: 'Marcação avançada' },
            balanced: { name: 'Equilibrado', class: 'tactic-balanced', description: 'Balanço ataque/defesa' }
        };

        // Sistema de substituição
        let substitutionState = {
            team1: { player1Index: null, player1Type: null },
            team2: { player1Index: null, player1Type: null },
            career: { player1Index: null, player1Type: null }
        };

        // Ligas e times
        const leagues = {

            'Bundesliga': {

                teams: ['Bayern München', 'Borussia Dortmund', 'RB Leipzig', 'Bayer Leverkusen', 'Wolfsburg', 'Eintracht Frankfurt', 'Freiburg', 'Union Berlin', 'Mainz 05', 'Borussia Mönchengladbach', 'Werder Bremen', 'Augsburg', 'Hoffenheim', 'Stuttgart', 'Bochum', 'Heidenheim', 'Darmstadt', 'Köln', 'Schalke 04', 'Hamburger SV']
            },
            'Ligue 1': {
                name: 'Ligue 1', country: 'França',
                competitions: ['Ligue 1', 'Copa da França', 'Champions League'],
                teams: ['PSG', 'Marseille', 'Lyon', 'Monaco', 'Lille', 'Rennes', 'Nice', 'Lens', 'Strasbourg', 'Reims', 'Montpellier', 'Toulouse', 'Nantes', 'Brest', 'Lorient', 'Auxerre', 'Ajaccio', 'Troyes', 'Angers', 'Clermont']
            },
            'Brasileirão': {
                name: 'Brasileirão', country: 'Brasil',
                competitions: ['Brasileirão', 'Copa do Brasil', 'Libertadores'],

                competitions: ['Liga Portuguesa', 'Taça de Portugal', 'Champions League'],
                teams: ['Benfica', 'Porto', 'Sporting', 'Braga', 'Vitória Guimarães', 'Boavista', 'Famalicão', 'Rio Ave', 'Estoril', 'Portimonense', 'Gil Vicente', 'Moreirense', 'Casa Pia', 'Estrela Amadora', 'Farense', 'Arouca', 'Vizela', 'Chaves', 'Marítimo', 'Paços Ferreira']

            }
        };

        function getTeamData(teamName) {
            if (teamsDataCache[teamName]) {
                return JSON.parse(JSON.stringify(teamsDataCache[teamName]));
            }
            const data = generateDefaultTeamData(teamName);
            teamsDataCache[teamName] = JSON.parse(JSON.stringify(data));
            return data;
        }

        function updateTeamData(teamName, data) {
            teamsDataCache[teamName] = JSON.parse(JSON.stringify(data));
        }

        function generateDefaultTeamData(teamName) {
            const positions = ['GOL', 'ZAG', 'LAT', 'VOL', 'MEI', 'ATA', 'PE'];
            const playerNames = [
                'Jogador 1', 'Jogador 2', 'Jogador 3', 'Jogador 4', 'Jogador 5',
                'Jogador 6', 'Jogador 7', 'Jogador 8', 'Jogador 9', 'Jogador 10',
                'Jogador 11', 'Jogador 12', 'Jogador 13', 'Jogador 14', 'Jogador 15',
                'Jogador 16', 'Jogador 17', 'Jogador 18', 'Jogador 19', 'Jogador 20',
                'Jogador 21', 'Jogador 22', 'Jogador 23'
            ];
            
            const topTeams = ['Manchester City', 'Real Madrid', 'Bayern München', 'PSG', 'Liverpool', 
                            'Barcelona', 'Inter Milan', 'Flamengo', 'Palmeiras', 'Benfica', 'Al-Hilal'];
            const goodTeams = ['Arsenal', 'Chelsea', 'Atlético Madrid', 'Juventus', 'Borussia Dortmund',
                             'Marseille', 'São Paulo', 'Porto', 'Al-Nassr', 'Manchester United'];
            
            let baseRating;
            if (topTeams.includes(teamName)) baseRating = 84;
            else if (goodTeams.includes(teamName)) baseRating = 79;
            else baseRating = 73;
            
            const players = [];
            for (let i = 0; i < 23; i++) {
                const position = positions[Math.floor(Math.random() * positions.length)];
                const rating = Math.max(60, Math.min(95, baseRating + Math.floor(Math.random() * 10) - 5));
                players.push({
                    id: i, name: playerNames[i], position: position,
                    number: Math.floor(Math.random() * 99) + 1, rating: rating,
                    injured: false, injuryType: null, yellowCards: 0, redCards: 0,
                    goals: 0, assists: 0
                });
            }
            
            return { stadium: 'Estádio ' + teamName, coach: 'Técnico do ' + teamName, tactic: 'balanced', tacticName: 'Equilibrado', players: players };
        }

        function getTeamPlayers(teamName) {
            return getTeamData(teamName).players;
        }

        function updateTeamPlayers(teamName, players) {
            const teamData = getTeamData(teamName);
            teamData.players = players;
            updateTeamData(teamName, teamData);
        }

        function calculateTeamOverall(players) {
            if (players.length === 0) return 0;
            const sortedPlayers = [...players].sort((a, b) => b.rating - a.rating);
            const top11 = sortedPlayers.slice(0, Math.min(11, sortedPlayers.length));
            return Math.round(top11.reduce((sum, p) => sum + p.rating, 0) / top11.length);
        }

        let gameState = {
            mode: null,
            selectedLeague1: null, selectedTeam1: null,
            selectedLeague2: null, selectedTeam2: null,
            team1Lineup: [], team2Lineup: [],
            team1Overall: 0, team2Overall: 0,
            team1Data: null, team2Data: null,
            formations: ['4-4-2', '4-3-3', '3-5-2', '4-2-3-1', '3-4-3'],
            currentFormation1: '4-4-2', currentFormation2: '4-4-2',
            step: 1,
            careerTeam: null, careerLeague: null,
            careerSquad: [], careerOverall: 0, careerData: null
        };

        function goToMain() {
            document.querySelectorAll('#mainScreen, #simulatorScreen, #simulationScreen, #careerScreen, #careerManagement').forEach(el => {
                el.classList.add('hidden');
            });
            document.getElementById('mainScreen').classList.remove('hidden');
            gameState.step = 1;
            clearAllSubstitutions();
        }

        function selectMode(mode) {
            gameState.mode = mode;
            document.getElementById('mainScreen').classList.add('hidden');
            if (mode === 'simulator') {
                document.getElementById('simulatorScreen').classList.remove('hidden');
                gameState.step = 1;
                renderSimulatorStep();
            } else {
                document.getElementById('careerScreen').classList.remove('hidden');
                renderCareerStep();
            }
        }

        function renderSimulatorStep() {
            const content = document.getElementById('simulatorContent');
            if (gameState.step === 1) {
                content.innerHTML = '<h3>Escolha o Time 1:</h3>' + renderLeaguesGrid('simulator1');
            } else if (gameState.step === 2) {
                content.innerHTML = '<h3>Escolha o Time 2:</h3>' + renderLeaguesGrid('simulator2');
            } else if (gameState.step === 3) {
                renderSimulationOptions();
            }
        }

        function renderLeaguesGrid(type) {
            let html = '<div class="leagues-grid">';
            for (const [leagueName, leagueData] of Object.entries(leagues)) {
                html += `<div class="league-card" onclick="selectLeague('${leagueName}', '${type}')"><h3>${leagueData.name}</h3><p>${leagueData.country}</p><p>20 times</p></div>`;
            }
            html += '</div><div id="teamsContainer_' + type + '"></div>';
            return html;
        }

        function selectLeague(leagueName, type) {
            if (type === 'simulator1') gameState.selectedLeague1 = leagueName;
            else gameState.selectedLeague2 = leagueName;
            
            const container = document.getElementById('teamsContainer_' + type);
            const leagueData = leagues[leagueName];
            let html = '<h3>Selecione o Time:</h3><div class="teams-list">';
            
            leagueData.teams.forEach(team => {
                const isSelected = (type === 'simulator1' && gameState.selectedTeam1 === team) || 
                                 (type === 'simulator2' && gameState.selectedTeam2 === team);
                const teamPlayers = getTeamPlayers(team);
                const teamOverall = calculateTeamOverall(teamPlayers);
                const teamData = getTeamData(team);
                
                html += `<div class="team-item ${isSelected ? 'selected' : ''}" onclick="selectTeam('${team}', '${leagueName}', '${type}')"><div><span>${team}</span><small style="display:block;color:#b0b0b0;">${teamData.coach}</small></div><span class="team-overall">${teamOverall}</span></div>`;
            });
            
            html += '</div>';
            container.innerHTML = html;
        }

        function selectTeam(teamName, leagueName, type) {
            if (type === 'simulator1') {
                gameState.selectedTeam1 = teamName;
                gameState.selectedLeague1 = leagueName;
                gameState.team1Lineup = getTeamPlayers(teamName);
                gameState.team1Overall = calculateTeamOverall(gameState.team1Lineup);
                gameState.team1Data = getTeamData(teamName);
                gameState.currentFormation1 = '4-4-2';
                clearSubstitution('team1');
                renderTeamDetails('team1', teamName);
                setTimeout(() => {
                    if (confirm(`Time 1: ${teamName} (Overall: ${gameState.team1Overall}). Prosseguir?`)) {
                        gameState.step = 2; renderSimulatorStep();
                    }
                }, 500);
            } else if (type === 'simulator2') {
                gameState.selectedTeam2 = teamName;
                gameState.selectedLeague2 = leagueName;
                gameState.team2Lineup = getTeamPlayers(teamName);
                gameState.team2Overall = calculateTeamOverall(gameState.team2Lineup);
                gameState.team2Data = getTeamData(teamName);
                gameState.currentFormation2 = '4-4-2';
                clearSubstitution('team2');
                renderTeamDetails('team2', teamName);
                setTimeout(() => {
                    if (confirm(`Time 2: ${teamName} (Overall: ${gameState.team2Overall}). Iniciar simulação?`)) {
                        gameState.step = 3; renderSimulatorStep();
                    }
                }, 500);
            } else if (type === 'career') {
                selectCareerTeam(teamName, leagueName);
            }
        }

        function clearSubstitution(teamType) {
            substitutionState[teamType] = { player1Index: null, player1Type: null };
        }

        function clearAllSubstitutions() {
            clearSubstitution('team1'); clearSubstitution('team2'); clearSubstitution('career');
        }

        function handlePlayerClick(teamType, playerIndex, playerType) {
            const state = substitutionState[teamType];
            if (state.player1Index === null) {
                state.player1Index = playerIndex; state.player1Type = playerType;
                refreshTeamView(teamType); return;
            }
            if (state.player1Index === playerIndex && state.player1Type === playerType) {
                clearSubstitution(teamType); refreshTeamView(teamType); return;
            }
            performSubstitution(teamType, state.player1Index, state.player1Type, playerIndex, playerType);
            clearSubstitution(teamType); refreshTeamView(teamType);
        }

        function performSubstitution(teamType, index1, type1, index2, type2) {
            let players, teamName;
            if (teamType === 'team1') { players = gameState.team1Lineup; teamName = gameState.selectedTeam1; }
            else if (teamType === 'team2') { players = gameState.team2Lineup; teamName = gameState.selectedTeam2; }
            else { players = gameState.careerSquad; teamName = gameState.careerTeam; }
            
            if (index1 >= 0 && index1 < players.length && index2 >= 0 && index2 < players.length) {
                const temp = players[index1];
                players[index1] = players[index2];
                players[index2] = temp;
                updateTeamPlayers(teamName, players);
                const newOverall = calculateTeamOverall(players);
                if (teamType === 'team1') gameState.team1Overall = newOverall;
                else if (teamType === 'team2') gameState.team2Overall = newOverall;
                else gameState.careerOverall = newOverall;
                showAlert(`✅ Troca realizada! Novo Overall: ${newOverall}`);
            }
        }

        function refreshTeamView(teamType) {
            if (teamType === 'team1') renderTeamDetails('team1', gameState.selectedTeam1);
            else if (teamType === 'team2') renderTeamDetails('team2', gameState.selectedTeam2);
            else showCareerTab('squad');
        }

        function showAlert(message) {
            const existingAlert = document.querySelector('.alert-message');
            if (existingAlert) existingAlert.remove();
            const alertDiv = document.createElement('div');
            alertDiv.className = 'alert-message';
            alertDiv.textContent = message;
            const container = document.getElementById('simulatorContent') || document.getElementById('careerManagementContent');
            if (container) { container.insertBefore(alertDiv, container.firstChild); setTimeout(() => alertDiv.remove(), 3000); }
        }

        function openEditTeamModal(teamType) {
            let teamName, teamData;
            if (teamType === 'team1') { teamName = gameState.selectedTeam1; teamData = gameState.team1Data; }
            else if (teamType === 'team2') { teamName = gameState.selectedTeam2; teamData = gameState.team2Data; }
            else { teamName = gameState.careerTeam; teamData = gameState.careerData; }
            
            const modalContent = document.getElementById('editModalContent');
            modalContent.innerHTML = `
                <h3>✏️ Editar ${teamName}</h3>
                <label>🏟️ Estádio:</label><input type="text" id="editStadium" value="${teamData.stadium}" class="edit-input" style="width:100%;">
                <label>👔 Técnico:</label><input type="text" id="editCoach" value="${teamData.coach}" class="edit-input" style="width:100%;">
                <label>🎯 Dinâmica:</label>
                <select id="editTactic">${Object.entries(tactics).map(([k,v]) => `<option value="${k}" ${teamData.tactic===k?'selected':''}>${v.name}</option>`).join('')}</select>
                <h4 style="margin-top:20px;color:#ffd700;">👥 Jogadores:</h4>
                <div style="max-height:300px;overflow-y:auto;">
                    ${teamData.players.map((p,i) => `
                        <div style="display:flex;gap:8px;margin:8px 0;align-items:center;">
                            <input type="text" value="${p.name}" class="edit-input player-name-edit" data-index="${i}" style="flex:2;">
                            <select class="player-pos-edit" data-index="${i}" style="flex:1;">
                                ${['GOL','ZAG','LAT','VOL','MEI','ATA','PE'].map(pos => `<option value="${pos}" ${p.position===pos?'selected':''}>${pos}</option>`).join('')}
                            </select>
                            <input type="number" value="${p.rating}" class="rating-input player-rating-edit" data-index="${i}" min="50" max="99" style="width:60px;">
                        </div>
                    `).join('')}
                </div>
                <div style="display:flex;gap:10px;margin-top:20px;">
                    <button class="btn btn-save" onclick="saveTeamEdits('${teamType}')">💾 Salvar</button>
                    <button class="btn btn-cancel" onclick="closeEditModal()">❌ Cancelar</button>
                </div>
            `;
            document.getElementById('editModal').classList.remove('hidden');
        }

        function closeEditModal() { document.getElementById('editModal').classList.add('hidden'); }

        function saveTeamEdits(teamType) {
            const newStadium = document.getElementById('editStadium').value;
            const newCoach = document.getElementById('editCoach').value;
            const newTactic = document.getElementById('editTactic').value;
            
            let teamName, players;
            if (teamType === 'team1') { teamName = gameState.selectedTeam1; players = gameState.team1Lineup; }
            else if (teamType === 'team2') { teamName = gameState.selectedTeam2; players = gameState.team2Lineup; }
            else { teamName = gameState.careerTeam; players = gameState.careerSquad; }
            
            document.querySelectorAll('.player-name-edit').forEach(input => {
                const i = parseInt(input.dataset.index);
                if (i < players.length) players[i].name = input.value || players[i].name;
            });
            document.querySelectorAll('.player-pos-edit').forEach(select => {
                const i = parseInt(select.dataset.index);
                if (i < players.length) players[i].position = select.value;
            });
            document.querySelectorAll('.player-rating-edit').forEach(input => {
                const i = parseInt(input.dataset.index);
                if (i < players.length) players[i].rating = Math.max(50, Math.min(99, parseInt(input.value) || 50));
            });
            
            const teamData = getTeamData(teamName);
            teamData.stadium = newStadium; teamData.coach = newCoach;
            teamData.tactic = newTactic; teamData.tacticName = tactics[newTactic].name;
            teamData.players = players;
            updateTeamData(teamName, teamData);
            updateTeamPlayers(teamName, players);
            
            const newOverall = calculateTeamOverall(players);
            if (teamType === 'team1') { gameState.team1Overall = newOverall; gameState.team1Data = teamData; gameState.team1Lineup = players; renderTeamDetails('team1', teamName); }
            else if (teamType === 'team2') { gameState.team2Overall = newOverall; gameState.team2Data = teamData; gameState.team2Lineup = players; renderTeamDetails('team2', teamName); }
            else { gameState.careerOverall = newOverall; gameState.careerData = teamData; gameState.careerSquad = players; showCareerTab('squad'); }
            
            closeEditModal();
            showAlert('✅ Dados atualizados!');
        }

        function renderTeamDetails(teamType, teamName) {
            const players = teamType === 'team1' ? gameState.team1Lineup : gameState.team2Lineup;
            const overall = teamType === 'team1' ? gameState.team1Overall : gameState.team2Overall;
            const teamData = teamType === 'team1' ? gameState.team1Data : gameState.team2Data;
            const state = substitutionState[teamType];
            const formation = teamType === 'team1' ? gameState.currentFormation1 : gameState.currentFormation2;
            
            const container = document.getElementById('simulatorContent');
            const existingLayout = container.querySelector('.main-layout');
            if (existingLayout) {
                const ed = existingLayout.querySelector('#details_' + teamType);
                if (ed) ed.remove();
            }
            
            const starters = players.slice(0, 11);
            const bench = players.slice(11);
            const tacticClass = tactics[teamData.tactic]?.class || 'tactic-balanced';
            
            const detailsDiv = document.createElement('div');
            detailsDiv.className = 'team-details';
            detailsDiv.id = 'details_' + teamType;
            
            let html = `
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <h3>${teamName}</h3>
                    <button class="btn btn-edit" onclick="openEditTeamModal('${teamType}')">✏️ Editar</button>
                </div>
                <div class="team-overall-display">${overall}<div style="font-size:0.3em;">OVERALL</div></div>
                <div class="team-info-card">
                    <h4>📋 Informações</h4>
                    <div class="info-row"><span class="info-label">🏟️ Estádio:</span><span class="info-value">${teamData.stadium}</span></div>
                    <div class="info-row"><span class="info-label">👔 Técnico:</span><span class="info-value">${teamData.coach}</span></div>
                    <div class="info-row"><span class="info-label">🎯 Dinâmica:</span><span class="info-value"><span class="tactic-badge ${tacticClass}">${teamData.tacticName}</span></span></div>
                </div>
            `;
            
            if (state.player1Index !== null) {
                const sp = players[state.player1Index];
                html += `
                    <div class="substitution-panel">
                        <h4>🔄 Selecione o 2º jogador</h4>
                        <div style="display:flex;justify-content:center;gap:20px;">
                            <div><strong>${sp.name}</strong><br><small>Rating: ${sp.rating}</small></div>
                            <div style="font-size:2em;">🔁</div>
                            <div><small>Clique em outro</small></div>
                        </div>
                        <button class="btn btn-cancel" onclick="clearSubstitution('${teamType}');renderTeamDetails('${teamType}','${teamName}');">Cancelar</button>
                    </div>
                `;
            }
            
            html += `
                <select onchange="changeFormation('${teamType}',this.value)">
                    ${gameState.formations.map(f => `<option value="${f}" ${f===formation?'selected':''}>${f}</option>`).join('')}
                </select>
                <div class="formation-pitch">${renderFormation(teamType, starters, players, state)}</div>
                <div class="squad-container">
                    <div class="squad-column starters"><h4>🌟 Titulares (11)</h4><div class="squad-list">${renderSquadList(teamType,starters,'starter',players,state)}</div></div>
                    <div class="squad-column bench"><h4>🔄 Reservas (${bench.length})</h4><div class="squad-list">${renderSquadList(teamType,bench,'bench',players,state)}</div></div>
                </div>
                <button class="btn" onclick="confirmTeamSelection('${teamType}')">✅ Confirmar</button>
            `;
            
            detailsDiv.innerHTML = html;
            
            if (!existingLayout) {
                const layout = document.createElement('div');
                layout.className = 'main-layout';
                layout.appendChild(detailsDiv);
                container.appendChild(layout);
            } else {
                existingLayout.appendChild(detailsDiv);
            }
        }

        function renderFormation(teamType, starters, allPlayers, state) {
            const formation = teamType === 'team1' ? gameState.currentFormation1 : gameState.currentFormation2;
            const positions = getFormationPositions(formation);
            let html = '';
            const fp = starters.slice(0, 11);
            positions.forEach((pos, i) => {
                const player = fp[i];
                if (player) {
                    const pi = allPlayers.indexOf(player);
                    html += `<div class="player-dot ${state.player1Index===pi?'selected-for-sub':''}" style="left:${pos.x}%;top:${pos.y}%;" onclick="handlePlayerClick('${teamType}',${pi},'starter')"><span class="player-name">${player.name.split(' ')[0]}</span>${player.position}<span class="player-rating">${player.rating}</span></div>`;
                }
            });
            return html;
        }

        function renderSquadList(teamType, players, playerType, allPlayers, state) {
            let html = '';
            players.forEach(p => {
                const oi = allPlayers.indexOf(p);
                html += `<div class="squad-player ${state.player1Index===oi?'selected-for-sub':''}" onclick="handlePlayerClick('${teamType}',${oi},'${playerType}')"><div class="player-info"><span>${p.number} - ${p.name} (${p.position})</span><span class="player-rating-display">${p.rating}</span></div></div>`;
            });
            return html;
        }

        function getFormationPositions(formation) {
            const positions = [];
            switch(formation) {
                case '4-4-2':
                    positions.push({x:50,y:85,position:'GOL'});
                    positions.push({x:20,y:65,position:'DEF'},{x:40,y:65,position:'DEF'},{x:60,y:65,position:'DEF'},{x:80,y:65,position:'DEF'});
                    positions.push({x:20,y:45,position:'MEI'},{x:40,y:45,position:'MEI'},{x:60,y:45,position:'MEI'},{x:80,y:45,position:'MEI'});
                    positions.push({x:35,y:25,position:'ATA'},{x:65,y:25,position:'ATA'});
                    break;
                case '4-3-3':
                    positions.push({x:50,y:85,position:'GOL'});
                    positions.push({x:20,y:65,position:'DEF'},{x:40,y:65,position:'DEF'},{x:60,y:65,position:'DEF'},{x:80,y:65,position:'DEF'});
                    positions.push({x:30,y:45,position:'MEI'},{x:50,y:45,position:'MEI'},{x:70,y:45,position:'MEI'});
                    positions.push({x:20,y:25,position:'ATA'},{x:50,y:25,position:'ATA'},{x:80,y:25,position:'ATA'});
                    break;
                default:
                    positions.push({x:50,y:85,position:'GOL'});
                    for(let i=0;i<10;i++) positions.push({x:20+(i*7),y:50,position:'JOG'});
            }
            return positions;
        }

        function changeFormation(teamType, formation) {
            if (teamType==='team1') gameState.currentFormation1=formation;
            else gameState.currentFormation2=formation;
            renderTeamDetails(teamType, teamType==='team1'?gameState.selectedTeam1:gameState.selectedTeam2);
        }

        function confirmTeamSelection(teamType) {
            if (teamType==='team1') { gameState.step=2; renderSimulatorStep(); }
            else { gameState.step=3; renderSimulatorStep(); }
        }

        function renderSimulationOptions() {
            const content = document.getElementById('simulatorContent');
            const tc1 = tactics[gameState.team1Data.tactic].class;
            const tc2 = tactics[gameState.team2Data.tactic].class;
            content.innerHTML = `
                <h3>Simular Partida:</h3>
                <div style="display:flex;justify-content:center;align-items:center;gap:40px;margin:30px 0;flex-wrap:wrap;">
                    <div style="text-align:center;"><h4>${gameState.selectedTeam1}</h4><div class="team-overall-display" style="font-size:2em;">${gameState.team1Overall}</div><p>👔 ${gameState.team1Data.coach}</p><span class="tactic-badge ${tc1}">${gameState.team1Data.tacticName}</span></div>
                    <div style="font-size:3em;color:#fff;">VS</div>
                    <div style="text-align:center;"><h4>${gameState.selectedTeam2}</h4><div class="team-overall-display" style="font-size:2em;">${gameState.team2Overall}</div><p>👔 ${gameState.team2Data.coach}</p><span class="tactic-badge ${tc2}">${gameState.team2Data.tacticName}</span></div>
                </div>
                <div class="simulation-options">
                    <div class="sim-card" onclick="simulateMatch('quick')"><h3>⚡ Rápida</h3></div>
                    <div class="sim-card" onclick="simulateMatch('minute')"><h3>⏱️ Minuto a Minuto</h3></div>
                    <div class="sim-card" onclick="simulateMatch('visual')"><h3>🔵 Visual</h3></div>
                </div>
            `;
        }

        function simulateMatch(type) {
            document.getElementById('simulatorScreen').classList.add('hidden');
            document.getElementById('simulationScreen').classList.remove('hidden');
            const match = generateMatchResult();
            if (type === 'quick') displayMatchResult(match);
            else if (type === 'minute') simulateMinuteByMinute(match);
            else if (type === 'visual') simulateVisual(match);
        }

        function generateMatchResult() {
            const t1o = gameState.team1Overall, t2o = gameState.team2Overall;
            const diff = t1o - t2o;
            const tb = getTacticBonus(gameState.team1Data.tactic, gameState.team2Data.tactic);
            const adj = diff + tb;
            
            let g1, g2;
            // Gols mais realistas - máximo 4 gols por time
            if (adj > 5) { g1 = Math.floor(Math.random() * 3) + 1; g2 = Math.floor(Math.random() * 2); }
            else if (adj < -5) { g1 = Math.floor(Math.random() * 2); g2 = Math.floor(Math.random() * 3) + 1; }
            else if (adj > 2) { g1 = Math.floor(Math.random() * 2) + 1; g2 = Math.floor(Math.random() * 2); }
            else if (adj < -2) { g1 = Math.floor(Math.random() * 2); g2 = Math.floor(Math.random() * 2) + 1; }
            else { g1 = Math.floor(Math.random() * 2); g2 = Math.floor(Math.random() * 2); }
            
            return {
                team1: gameState.selectedTeam1, team2: gameState.selectedTeam2,
                team1Overall: t1o, team2Overall: t2o,
                team1Data: gameState.team1Data, team2Data: gameState.team2Data,
                goals1: g1, goals2: g2,
                possession: Math.floor(Math.random() * 20) + 40 + (diff / 2),
                shots1: Math.floor(Math.random() * 8) + 2 + Math.floor(t1o / 25),
                shots2: Math.floor(Math.random() * 8) + 2 + Math.floor(t2o / 25),
                yellowCards1: Math.floor(Math.random() * 3), yellowCards2: Math.floor(Math.random() * 3),
                redCards1: Math.random() > 0.95 ? 1 : 0, redCards2: Math.random() > 0.95 ? 1 : 0,
                injuries: Math.floor(Math.random() * 2)
            };
        }

        function getTacticBonus(t1, t2) {
            const bonuses = {
                'offensive': {'defensive':1,'possession':0,'counter':-1,'pressing':2,'balanced':1},
                'defensive': {'offensive':-1,'possession':-1,'counter':2,'pressing':0,'balanced':0},
                'possession': {'offensive':0,'defensive':1,'counter':0,'pressing':-1,'balanced':1},
                'counter': {'offensive':1,'defensive':-2,'possession':0,'pressing':2,'balanced':0},
                'pressing': {'offensive':-2,'defensive':0,'possession':1,'counter':-2,'balanced':-1},
                'balanced': {'offensive':-1,'defensive':0,'possession':-1,'counter':0,'pressing':1}
            };
            return bonuses[t1]?.[t2] || 0;
        }

        // ============================================
        // SIMULAÇÃO MINUTO A MINUTO MELHORADA
        // ============================================
        function simulateMinuteByMinute(match) {
            const content = document.getElementById('simulationContent');
            
            // Resetar estatísticas dos jogadores
            const team1Players = JSON.parse(JSON.stringify(gameState.team1Lineup));
            const team2Players = JSON.parse(JSON.stringify(gameState.team2Lineup));
            
            // Inicializar estatísticas dos jogadores
            team1Players.forEach(p => { p.goals = 0; p.assists = 0; p.yellowCards = 0; p.redCards = 0; p.injured = false; });
            team2Players.forEach(p => { p.goals = 0; p.assists = 0; p.yellowCards = 0; p.redCards = 0; p.injured = false; });
            
            // Criar cópias para controle de substituições durante o jogo
            let liveTeam1 = JSON.parse(JSON.stringify(team1Players));
            let liveTeam2 = JSON.parse(JSON.stringify(team2Players));
            
            let currentGoals1 = 0, currentGoals2 = 0;
            let yellowCards1 = 0, yellowCards2 = 0;
            let redCards1 = 0, redCards2 = 0;
            let injuries1 = 0, injuries2 = 0;
            let substitutions1 = 0, substitutions2 = 0;
            let shots1 = 0, shots2 = 0;
            let possession1 = 50, possession2 = 50;
            
            const matchEvents = [];
            const playerStats1 = {};
            const playerStats2 = {};
            
            // Inicializar stats dos jogadores
            liveTeam1.forEach(p => { playerStats1[p.name] = { goals: 0, cards: 0, substituted: false, subOut: null, subIn: null }; });
            liveTeam2.forEach(p => { playerStats2[p.name] = { goals: 0, cards: 0, substituted: false, subOut: null, subIn: null }; });
            
            content.innerHTML = `
                <div class="match-result">
                    <h2 style="text-align:center;">⏱️ Simulação Minuto a Minuto</h2>
                    
                    <div style="display:flex;justify-content:center;align-items:center;gap:30px;margin:20px 0;">
                        <div style="text-align:center;">
                            <h4>${match.team1}</h4>
                            <div class="team-overall-display" style="font-size:1.2em;">${match.team1Overall}</div>
                        </div>
                        <div class="score-display" id="liveScore">0 - 0</div>
                        <div style="text-align:center;">
                            <h4>${match.team2}</h4>
                            <div class="team-overall-display" style="font-size:1.2em;">${match.team2Overall}</div>
                        </div>
                    </div>
                    <div class="minute-display" id="minuteDisplay">⏳ 0'</div>
                    
                    <div class="minute-simulation-container">
                        <div class="minute-log-panel" id="minuteLog">
                            <h4 style="color:#ffd700;">📝 Acontecimentos</h4>
                            <div id="eventList"></div>
                        </div>
                        <div class="minute-stats-panel">
                            <h4 style="color:#ffd700;">📊 Estatísticas em Tempo Real</h4>
                            <div class="live-stats">
                                <div class="live-stat-item"><h4>Posse</h4><p id="livePossession">50% - 50%</p></div>
                                <div class="live-stat-item"><h4>Chutes</h4><p id="liveShots">0 - 0</p></div>
                                <div class="live-stat-item"><h4>Amarelos</h4><p id="liveYellow">0 - 0</p></div>
                                <div class="live-stat-item"><h4>Vermelhos</h4><p id="liveRed">0 - 0</p></div>
                                <div class="live-stat-item"><h4>Lesões</h4><p id="liveInjuries">0 - 0</p></div>
                                <div class="live-stat-item"><h4>Substituições</h4><p id="liveSubs">0 - 0</p></div>
                            </div>
                            
                            <h4 style="color:#ffd700;margin-top:20px;">👤 Jogadores - ${match.team1}</h4>
                            <div id="playerStats1" style="max-height:150px;overflow-y:auto;"></div>
                            
                            <h4 style="color:#ffd700;margin-top:15px;">👤 Jogadores - ${match.team2}</h4>
                            <div id="playerStats2" style="max-height:150px;overflow-y:auto;"></div>
                        </div>
                    </div>
                </div>
            `;
            
            // Ajustar probabilidades para jogo mais realista (menos gols)
            const baseGoalChance = 0.03; // Chance base por minuto (reduzida)
            const overallDiff = match.team1Overall - match.team2Overall;
            const goalChanceBonus = Math.abs(overallDiff) / 500; // Bônus pequeno
            
            let minute = 0;
            const maxGoals = 5; // Máximo de gols na partida
            
            const interval = setInterval(() => {
                minute++;
                
                if (minute <= 90) {
                    document.getElementById('minuteDisplay').textContent = `⏳ ${minute}'`;
                    
                    // Atualizar posse de bola gradualmente
                    if (Math.random() < 0.3) {
                        possession1 = Math.max(30, Math.min(70, possession1 + (Math.random() * 6 - 3)));
                        possession2 = 100 - possession1;
                        document.getElementById('livePossession').textContent = `${Math.round(possession1)}% - ${Math.round(possession2)}%`;
                    }
                    
                    // Chance de chute (mais comum que gol)
                    if (Math.random() < 0.08) {
                        if (Math.random() < possession1 / 100) {
                            shots1++;
                            addEvent('minuteLog', 'event-info', `${minute}' 🥅 Chute do ${match.team1}!`);
                        } else {
                            shots2++;
                            addEvent('minuteLog', 'event-info', `${minute}' 🥅 Chute do ${match.team2}!`);
                        }
                        document.getElementById('liveShots').textContent = `${shots1} - ${shots2}`;
                    }
                    
                    // Chance de gol (reduzida)
                    if (Math.random() < baseGoalChance + goalChanceBonus) {
                        if (currentGoals1 + currentGoals2 < maxGoals) {
                            // Time com maior overall tem mais chance
                            const team1Chance = 0.5 + (overallDiff / 200);
                            
                            if (Math.random() < team1Chance) {
                                currentGoals1++;
                                // Atribuir gol a um jogador aleatório
                                const scorer = liveTeam1[Math.floor(Math.random() * Math.min(11, liveTeam1.length))];
                                if (scorer) {
                                    scorer.goals = (scorer.goals || 0) + 1;
                                    playerStats1[scorer.name].goals = scorer.goals;
                                }
                                addEvent('minuteLog', 'event-goal-home', `${minute}' ⚽ GOL DO ${match.team1}!!! ${scorer ? scorer.name : ''} (${currentGoals1}-${currentGoals2})`);
                            } else {
                                currentGoals2++;
                                const scorer = liveTeam2[Math.floor(Math.random() * Math.min(11, liveTeam2.length))];
                                if (scorer) {
                                    scorer.goals = (scorer.goals || 0) + 1;
                                    playerStats2[scorer.name].goals = scorer.goals;
                                }
                                addEvent('minuteLog', 'event-goal-away', `${minute}' ⚽ GOL DO ${match.team2}!!! ${scorer ? scorer.name : ''} (${currentGoals1}-${currentGoals2})`);
                            }
                            
                            document.getElementById('liveScore').textContent = `${currentGoals1} - ${currentGoals2}`;
                            updatePlayerStatsDisplay('playerStats1', liveTeam1, match.team1);
                            updatePlayerStatsDisplay('playerStats2', liveTeam2, match.team2);
                        }
                    }
                    
                    // Cartão amarelo
                    if (Math.random() < 0.02) {
                        if (Math.random() < 0.5) {
                            yellowCards1++;
                            const player = liveTeam1[Math.floor(Math.random() * liveTeam1.length)];
                            if (player) {
                                player.yellowCards = (player.yellowCards || 0) + 1;
                                playerStats1[player.name].cards = player.yellowCards;
                            }
                            addEvent('minuteLog', 'event-yellow', `${minute}' 🟨 Cartão Amarelo - ${match.team1}${player ? ' (' + player.name + ')' : ''}`);
                        } else {
                            yellowCards2++;
                            const player = liveTeam2[Math.floor(Math.random() * liveTeam2.length)];
                            if (player) {
                                player.yellowCards = (player.yellowCards || 0) + 1;
                                playerStats2[player.name].cards = player.yellowCards;
                            }
                            addEvent('minuteLog', 'event-yellow', `${minute}' 🟨 Cartão Amarelo - ${match.team2}${player ? ' (' + player.name + ')' : ''}`);
                        }
                        document.getElementById('liveYellow').textContent = `${yellowCards1} - ${yellowCards2}`;
                    }
                    
                    // Cartão vermelho (raro)
                    if (Math.random() < 0.005) {
                        if (Math.random() < 0.5) {
                            redCards1++;
                            const player = liveTeam1[Math.floor(Math.random() * liveTeam1.length)];
                            if (player) player.redCards = (player.redCards || 0) + 1;
                            addEvent('minuteLog', 'event-red', `${minute}' 🟥 Cartão VERMELHO - ${match.team1}${player ? ' (' + player.name + ')' : ''}`);
                        } else {
                            redCards2++;
                            const player = liveTeam2[Math.floor(Math.random() * liveTeam2.length)];
                            if (player) player.redCards = (player.redCards || 0) + 1;
                            addEvent('minuteLog', 'event-red', `${minute}' 🟥 Cartão VERMELHO - ${match.team2}${player ? ' (' + player.name + ')' : ''}`);
                        }
                        document.getElementById('liveRed').textContent = `${redCards1} - ${redCards2}`;
                    }
                    
                    // Substituições (a partir dos 55 minutos)
                    if (minute >= 55 && minute <= 85 && Math.random() < 0.03) {
                        if (Math.random() < 0.5 && substitutions1 < 3 && liveTeam1.length > 11) {
                            substitutions1++;
                            const outPlayer = liveTeam1[Math.floor(Math.random() * 11)];
                            const inPlayer = liveTeam1[11 + Math.floor(Math.random() * (liveTeam1.length - 11))];
                            if (outPlayer && inPlayer) {
                                playerStats1[outPlayer.name].subOut = minute;
                                playerStats1[inPlayer.name].subIn = minute;
                                addEvent('minuteLog', 'event-sub', `${minute}' 🔄 Substituição ${match.team1}: ${outPlayer.name} ⬅️ ➡️ ${inPlayer.name}`);
                            }
                        } else if (substitutions2 < 3 && liveTeam2.length > 11) {
                            substitutions2++;
                            const outPlayer = liveTeam2[Math.floor(Math.random() * 11)];
                            const inPlayer = liveTeam2[11 + Math.floor(Math.random() * (liveTeam2.length - 11))];
                            if (outPlayer && inPlayer) {
                                playerStats2[outPlayer.name].subOut = minute;
                                playerStats2[inPlayer.name].subIn = minute;
                                addEvent('minuteLog', 'event-sub', `${minute}' 🔄 Substituição ${match.team2}: ${outPlayer.name} ⬅️ ➡️ ${inPlayer.name}`);
                            }
                        }
                        document.getElementById('liveSubs').textContent = `${substitutions1} - ${substitutions2}`;
                    }
                    
                    // Lesões (raro)
                    if (Math.random() < 0.008) {
                        const injuryTypes = ['Torção no tornozelo', 'Distensão muscular', 'Pancada na coxa', 'Entorse no joelho'];
                        if (Math.random() < 0.5) {
                            injuries1++;
                            const player = liveTeam1[Math.floor(Math.random() * liveTeam1.length)];
                            const injury = injuryTypes[Math.floor(Math.random() * injuryTypes.length)];
                            if (player) player.injured = true;
                            addEvent('minuteLog', 'event-injury', `${minute}' 🤕 Lesão - ${match.team1}${player ? ' (' + player.name + ')' : ''}: ${injury}`);
                        } else {
                            injuries2++;
                            const player = liveTeam2[Math.floor(Math.random() * liveTeam2.length)];
                            const injury = injuryTypes[Math.floor(Math.random() * injuryTypes.length)];
                            if (player) player.injured = true;
                            addEvent('minuteLog', 'event-injury', `${minute}' 🤕 Lesão - ${match.team2}${player ? ' (' + player.name + ')' : ''}: ${injury}`);
                        }
                        document.getElementById('liveInjuries').textContent = `${injuries1} - ${injuries2}`;
                    }
                    
                    // Intervalo
                    if (minute === 45) {
                        addEvent('minuteLog', 'event-info', '⏸️ INTERVALO - Fim do primeiro tempo');
                        updatePlayerStatsDisplay('playerStats1', liveTeam1, match.team1);
                        updatePlayerStatsDisplay('playerStats2', liveTeam2, match.team2);
                    }
                    
                    // Scroll automático
                    const logEl = document.getElementById('minuteLog');
                    if (logEl) logEl.scrollTop = logEl.scrollHeight;
                    
                } else {
                    clearInterval(interval);
                    
                    // Atualizar dados finais
                    match.goals1 = currentGoals1;
                    match.goals2 = currentGoals2;
                    match.shots1 = shots1;
                    match.shots2 = shots2;
                    match.yellowCards1 = yellowCards1;
                    match.yellowCards2 = yellowCards2;
                    match.redCards1 = redCards1;
                    match.redCards2 = redCards2;
                    match.injuries = injuries1 + injuries2;
                    match.possession = Math.round(possession1);
                    
                    addEvent('minuteLog', 'event-info', '⏹️ FIM DE JOGO!');
                    updatePlayerStatsDisplay('playerStats1', liveTeam1, match.team1);
                    updatePlayerStatsDisplay('playerStats2', liveTeam2, match.team2);
                    
                    // Manter a tela por 5 segundos e depois mostrar resultado final
                    document.getElementById('minuteDisplay').textContent = '⏹️ FIM';
                    
                    // Adicionar botão para ver resultado final
                    const logPanel = document.getElementById('minuteLog');
                    if (logPanel) {
                        const btnDiv = document.createElement('div');
                        btnDiv.style.textAlign = 'center';
                        btnDiv.style.marginTop = '15px';
                        btnDiv.innerHTML = '<button class="btn" onclick="displayMatchResultFromMinute(' + JSON.stringify(match).replace(/"/g, '&quot;') + ')">📊 Ver Resultado Final</button>';
                        logPanel.appendChild(btnDiv);
                    }
                }
            }, 80); // Um pouco mais rápido para não demorar tanto
        }

            const container = document.getElementById(containerId);
            if (!container) return;
            const eventList = container.querySelector('#eventList');
            if (eventList) {
                const eventDiv = document.createElement('div');
                eventDiv.className = 'event-item ' + eventClass;
                eventDiv.textContent = message;
                eventList.appendChild(eventDiv);
                container.scrollTop = container.scrollHeight;
            }
        }

            let html = '';
            players.slice(0, 11).forEach(p => {

                const cards = (p.yellowCards || 0) + (p.redCards || 0);

        function renderCareerSquadTab(content){

            let html='<div class="team-details" style="margin-top:0;"><h3>Elenco</h3>';
            if(state.player1Index!==null){
                const sp=players[state.player1Index];
                html+=`<div class="substitution-panel"><h4>🔄 Selecione o 2º</h4><div style="display:flex;justify-content:center;gap:20px;"><div><strong>${sp.name}</strong></div><div>🔁</div><div><small>Clique em outro</small></div></div><button class="btn btn-cancel" onclick="clearSubstitution('career');showCareerTab('squad');">Cancelar</button></div>`;
            }
            html+=`<div class="formation-pitch">${renderCareerFormation(starters,players,state)}</div><div class="squad-container"><div class="squad-column starters"><h4>🌟 Titulares</h4><div class="squad-list">${renderCareerSquadList(starters,'starter',players,state)}</div></div><div class="squad-column bench"><h4>🔄 Reservas</h4><div class="squad-list">${renderCareerSquadList(bench,'bench',players,state)}</div></div></div></div>`;
            content.innerHTML=html;
        }

        function renderCareerFormation(starters,allPlayers,state){
            const positions=getFormationPositions('4-4-2');
            let html='';
            const fp=starters.slice(0,11);
            positions.forEach((pos,i)=>{
                const player=fp[i];
                if(player){
                    const pi=allPlayers.indexOf(player);
                    html+=`<div class="player-dot ${state.player1Index===pi?'selected-for-sub':''}" style="left:${pos.x}%;top:${pos.y}%;" onclick="handlePlayerClick('career',${pi},'starter')"><span class="player-name">${player.name.split(' ')[0]}</span>${player.position}<span class="player-rating">${player.rating}</span></div>`;
                }
            });
            return html;
        }

        function renderCareerSquadList(players,playerType,allPlayers,state){
            let html='';
            players.forEach(p=>{
                const oi=allPlayers.indexOf(p);
                html+=`<div class="squad-player ${state.player1Index===oi?'selected-for-sub':''}" onclick="handlePlayerClick('career',${oi},'${playerType}')"><div class="player-info"><span>${p.number} - ${p.name} (${p.position})</span><span class="player-rating-display">${p.rating}</span></div></div>`;
            });
            return html;
        }

        function simulateCareerMatch(type){
            const match=generateMatchResult();
            match.team1=gameState.careerTeam;
            match.team2='Adversário';
            match.team1Overall=gameState.careerOverall;
            match.team2Overall=Math.floor(Math.random()*15)+70;
            match.team1Data=gameState.careerData;
            match.team2Data={stadium:'Visitante',coach:'Técnico Adversário',tactic:'balanced',tacticName:'Equilibrado'};
            document.getElementById('careerManagement').classList.add('hidden');
            document.getElementById('simulationScreen').classList.remove('hidden');
            if(type==='quick')displayMatchResult(match);
            else if(type==='minute')simulateMinuteByMinute(match);
            else simulateVisual(match);
        }

        function simulateCareerSeason(){
            alert('🏆 Temporada simulada!');
        }
    </script>
</body>
</html>
